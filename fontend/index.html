<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand-panel">
                <div class="brand-icon"><i class="fas fa-search"></i></div>
                <div>
                    <h1>Chatbot</h1>
                    <p>Hỗ trợ tìm hiểu và giải bài tập.</p>
                </div>
            </div>

            <div class="sidebar-card">
                <h2>Hướng dẫn nhanh</h2>
                <ul>
                    <li>Nhập câu hỏi</li>
                    <li>Tải lên file</li>
                    <li>Nhận câu trả lời trực tiếp</li>
                </ul>
            </div>
        </aside>

        <main class="chat-panel">
            <div class="chat-header">
                <div>
                    <h2>Giải đáp bất kỳ thắc mắc nào</h2>
                    <p>Nhập câu hỏi hoặc tải lên tài liệu để bắt đầu.</p>
                </div>
            </div>

            <div id="chat-box" class="chat-box"></div>

            <div class="controls">
                <div class="input-group">
                    <div class="input-with-file">
                        <input id="input" type="text" placeholder="Nhập câu hỏi của bạn..." />
                        <div class="file-select">
                            <label for="file" class="file-label" title="Chọn file"><i class="fas fa-file-import"></i></label>
                        </div>
                        <div class="file-preview" style="display:none">
                            <span class="file-info" id="file-name">Chưa có file</span>
                            <button id="clear-file-btn" class="clear-file-btn" type="button" onclick="clearSelectedFile()" aria-label="Xóa file">×</button>
                        </div>
                    </div>
                    <button id="send-btn" onclick="send()"><i class="fas fa-paper-plane"></i></button>
                </div>
                <input type="file" id="file" accept=".pdf,image/*,.doc,.docx,.xls,.xlsx,.ppt,.pptx" hidden>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
